  metrics:
    build: ./metrics
    image: docker_metrics
    container_name: metrics
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./metrics:/mnt/metrics
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    expose:
      - "${METRICS_BIND_PORT}/tcp"
    ports:
      - "${METRICS_BIND_PORT}:${METRICS_BIND_PORT}/tcp"
    networks:
      default:
        ipv4_address: ${METRICS_IP}
        ipv6_address: ${METRICS_IP6}
  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/:/etc/grafana/provisioning/
      - ./grafana:/mnt/grafana
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USERNAME}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      #- GF_INSTALL_PLUGINS=${GRAFANA_INSTALL_PLUGINS}
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_PATHS_DATA=/var/lib/grafana
      - METRICS_IP=${METRICS_IP}
    expose:
      - "3000/tcp"
    ports:
      - "3000:3000/tcp"
    networks:
      default:
        ipv4_address: ${GRAFANA_IP}
        ipv6_address: ${GRAFANA_IP6}
networks:
  default:
    name: docker_open5gs_default
    enable_ipv6: true
    ipam:
      config:
        - subnet: ${TEST_NETWORK}
        - subnet: ${TEST_NETWORK6}
          gateway: ${TEST_NETWORK6_GW}
volumes:
  grafana_data:
    name: grafana_data
  mongodbdata:
    name: docker_open5gs_mongodbdata
  dbdata:
    name: docker_open5gs_dbdata
